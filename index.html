<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Subway Surfers Demake</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px; width: 100%; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        #score { font-size: 24px; font-weight: bold; color: gold; margin-bottom: 5px; }
        .instructions { font-size: 14px; margin-bottom: 10px; color: #fff; }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; text-shadow: 2px 2px 4px #000; z-index: 20;
        }
        .skin-controls { pointer-events: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; display: inline-block;}
        button, input[type="file"] {
            padding: 8px 12px; margin-right: 5px; cursor: pointer;
            background: #ff5e00; color: white; border: none; border-radius: 4px; font-weight: bold;
        }
        button:hover { background: #e04d00; }
        input[type="file"] { background: #333; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>3D Runner</h1>
        <div id="score">Score: 0 | Coins: 0</div>
        <div class="instructions">⬆️ Jump (Yellow Blocks) | ⬇️ Slide (Red Blocks) | ⬅️➡️ Move</div>
        <div class="skin-controls">
            <span>Upload Body Skin: </span>
            <input type="file" id="skin-upload" accept="image/*">
            <button onclick="resetSkin()">Default Red</button>
        </div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 40px; color: red;">CRASHED!</h1>
        <p>Press ENTER to Restart</p>
    </div>

    <script>
        // --- 1. GAME SETUP ---
        let score = 0;
        let coinCount = 0;
        let gameSpeed = 0.4; 
        let gameOver = false;
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 1, -8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB); 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 2. THE PLAYER (Fixed Rig) ---
        const player = new THREE.Group(); 
        
        let skinMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 }); 
        let shirtMat = new THREE.MeshLambertMaterial({ color: 0xff3333 }); 
        let pantsMat = new THREE.MeshLambertMaterial({ color: 0x2222ff }); 

        // Head
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMat);
        head.position.y = 2.4; // 0.8 (legs) + 1.2 (body) + 0.4 (half head)
        player.add(head);

        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.5), shirtMat);
        body.position.y = 1.4; // 0.8 (legs) + 0.6 (half body)
        player.add(body);

        // Legs (Using Groups for safe pivoting)
        const legLGroup = new THREE.Group();
        legLGroup.position.set(-0.25, 0.8, 0); // Hip joint position
        const legLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), pantsMat);
        legLMesh.position.y = -0.4; // Shift mesh down inside the pivot group
        legLGroup.add(legLMesh);
        player.add(legLGroup);

        const legRGroup = new THREE.Group();
        legRGroup.position.set(0.25, 0.8, 0); // Hip joint position
        const legRMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), pantsMat);
        legRMesh.position.y = -0.4;
        legRGroup.add(legRMesh);
        player.add(legRGroup);

        player.position.y = 0; 
        scene.add(player);

        // --- Skin Upload Logic ---
        document.getElementById('skin-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    body.material = new THREE.MeshLambertMaterial({ map: texture }); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        window.resetSkin = function() {
            body.material = shirtMat;
            document.getElementById('skin-upload').value = ""; 
        };

        // --- 3. THE ENVIRONMENT ---
        const groundGeo = new THREE.PlaneGeometry(30, 200);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2; 
        ground.position.z = -50;
        scene.add(ground);

        const laneGeo = new THREE.PlaneGeometry(0.2, 200);
        const laneMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lineLeft = new THREE.Mesh(laneGeo, laneMat);
        lineLeft.rotation.x = -Math.PI / 2; lineLeft.position.set(-1.5, 0.01, -50); scene.add(lineLeft);
        const lineRight = new THREE.Mesh(laneGeo, laneMat);
        lineRight.rotation.x = -Math.PI / 2; lineRight.position.set(1.5, 0.01, -50); scene.add(lineRight);

        // --- 4. GAME MECHANICS ---
        const laneXPositions = [-3, 0, 3]; 
        let currentLane = 1;
        
        // Action States
        let isJumping = false;
        let isSliding = false;
        let verticalVelocity = 0;
        const gravity = -0.035; // Snappier gravity
        const jumpStrength = 0.55; 

        let obstacles = [];
        let coins = [];
        let framesSinceLastSpawn = 0;

        // Geometries/Materials for reuse
        const obsGeo = new THREE.BoxGeometry(1.4, 1.0, 1.0); // Slightly thinner hitboxes
        const lowObsMat = new THREE.MeshLambertMaterial({ color: 0xffff00 }); // Yellow = Jump
        const highObsMat = new THREE.MeshLambertMaterial({ color: 0xff0000 }); // Red = Slide
        
        const coinGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.1, 16);
        coinGeo.rotateX(Math.PI / 2);
        const coinMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });

        function spawnWorldObjects() {
            framesSinceLastSpawn++;
            let spawnCooldown = Math.max(30, 70 - (score * 0.1)); 
            
            if (framesSinceLastSpawn > spawnCooldown && Math.random() > 0.4) { 
                // 1. Spawn Obstacle
                let isHigh = Math.random() > 0.6; // 40% chance of high obstacle
                const obs = new THREE.Mesh(obsGeo, isHigh ? highObsMat : lowObsMat);
                
                let obsLane = Math.floor(Math.random() * 3);
                // Low obstacles at Y=0.5, High obstacles at Y=2.0
                obs.position.set(laneXPositions[obsLane], isHigh ? 2.0 : 0.5, -60); 
                obs.isHigh = isHigh; // Store property for collision checks
                
                scene.add(obs);
                obstacles.push(obs);

                // 2. Spawn Coin in a different lane
                let coinLane = (obsLane + 1 + Math.floor(Math.random() * 2)) % 3;
                const coin = new THREE.Mesh(coinGeo, coinMat);
                coin.position.set(laneXPositions[coinLane], 1.0, -60);
                scene.add(coin);
                coins.push(coin);

                framesSinceLastSpawn = 0;
            }
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (gameOver && e.key === 'Enter') return resetGame();
            if (gameOver) return;

            if (e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
            if (e.key === 'ArrowRight' && currentLane < 2) currentLane++;
            
            // Jump
            if (e.key === 'ArrowUp' && !isJumping && !isSliding) {
                isJumping = true;
                verticalVelocity = jumpStrength; 
            }

            // Slide
            if (e.key === 'ArrowDown' && !isJumping && !isSliding) {
                isSliding = true;
                player.scale.y = 0.5; // Squish player
                player.position.y = -0.4; // visually stick to ground while squished
                
                setTimeout(() => {
                    player.scale.y = 1;
                    player.position.y = 0;
                    isSliding = false;
                }, 700); // Slide lasts 0.7 seconds
            }
        });

        function resetGame() {
            gameOver = false;
            score = 0; coinCount = 0; gameSpeed = 0.4; currentLane = 1;
            player.position.set(laneXPositions[currentLane], 0, 0);
            player.scale.y = 1; isSliding = false; isJumping = false;
            
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('score').innerText = `Score: 0 | Coins: 0`;
            framesSinceLastSpawn = 0;
            
            obstacles.forEach(obs => scene.remove(obs)); obstacles = [];
            coins.forEach(c => scene.remove(c)); coins = [];
            animate();
        }

        // --- 5. ANIMATION LOOP ---
        function animate() {
            if (gameOver) return;
            requestAnimationFrame(animate);

            // --- Player Movement & Animations ---
            let targetX = laneXPositions[currentLane];
            player.position.x += (targetX - player.position.x) * 0.2; 

            // Running Animation (only if not jumping or sliding)
            if (!isJumping && !isSliding) {
                const time = Date.now() * 0.015; 
                legLGroup.rotation.x = Math.sin(time) * 0.6;
                legRGroup.rotation.x = Math.sin(time + Math.PI) * 0.6; 
            } else {
                legLGroup.rotation.x = isSliding ? 0.5 : -0.2;
                legRGroup.rotation.x = isSliding ? 0.5 : 0.4;
            }

            // Handle Jumping Math
            if (isJumping) {
                player.position.y += verticalVelocity;
                verticalVelocity += gravity;
                if (player.position.y <= 0) {
                    player.position.y = 0;
                    isJumping = false;
                    verticalVelocity = 0;
                    legLGroup.rotation.x = 0; legRGroup.rotation.x = 0;
                }
            }

            // --- Game Objects ---
            spawnWorldObjects();

            // Obstacles
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.position.z += gameSpeed;

                // Collision Detection
                if (obs.position.z > -0.6 && obs.position.z < 0.6) { // If next to player
                    if (Math.abs(player.position.x - obs.position.x) < 0.8) { // If in same lane
                        if (obs.isHigh && !isSliding) {
                            // Hit high obstacle because didn't slide
                            gameOver = true; document.getElementById('game-over').style.display = 'block';
                        } else if (!obs.isHigh && player.position.y < 0.8) {
                            // Hit low obstacle because didn't jump high enough
                            gameOver = true; document.getElementById('game-over').style.display = 'block';
                        }
                    }
                }

                if (obs.position.z > 10) {
                    scene.remove(obs); obstacles.splice(i, 1); i--;
                    score += 10;
                    document.getElementById('score').innerText = `Score: ${score} | Coins: ${coinCount}`;
                    gameSpeed += 0.001; 
                }
            }

            // Coins
            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                coin.position.z += gameSpeed;
                coin.rotation.y += 0.05; // Spin the coin

                // Collect Coin
                if (coin.position.z > -0.5 && coin.position.z < 0.5) {
                    if (Math.abs(player.position.x - coin.position.x) < 0.8 && player.position.y < 2.0) {
                        scene.remove(coin); coins.splice(i, 1); i--;
                        coinCount++; score += 5;
                        document.getElementById('score').innerText = `Score: ${score} | Coins: ${coinCount}`;
                        continue;
                    }
                }

                if (coin.position.z > 10) {
                    scene.remove(coin); coins.splice(i, 1); i--;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
