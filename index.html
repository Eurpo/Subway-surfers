<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Subway Surfers Demake - Pagoda Race</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffeebb; font-family: sans-serif; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px; width: 100%; color: #333;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8); pointer-events: none; z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; color: #cc2222; text-shadow: 2px 2px 0px #fff; }
        #score { font-size: 24px; font-weight: bold; color: #b8860b; margin-bottom: 5px; }
        #powerup-meter { font-size: 18px; color: #cc2222; font-weight: bold; margin-bottom: 10px; }
        .instructions { font-size: 14px; margin-bottom: 10px; color: #222; font-weight: bold; }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; text-shadow: 2px 2px 4px #000; z-index: 20;
        }
        .controls-panel { pointer-events: auto; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px; display: inline-block; border: 2px solid #cc2222;}
        .controls-row { margin-bottom: 8px; }
        .controls-row:last-child { margin-bottom: 0; }
        button, input[type="file"] {
            padding: 8px 12px; margin-right: 5px; cursor: pointer;
            background: #cc2222; color: white; border: none; border-radius: 4px; font-weight: bold;
        }
        button:hover { background: #aa1111; }
        input[type="file"] { background: #555; }
        #toggle-ghost { background: #228b22; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>Pagoda Race</h1>
        <div id="score">Score: 0 | Coins: 0 | Best: 0</div>
        <div id="powerup-meter">Jetpack: READY (SHIFT) | Board: NEED 20 COINS (Press B)</div>
        <div class="instructions">WASD / Arrows = Move | SPACE = Jump | SHIFT = Fly | B = Buy Board</div>
        
        <div class="controls-panel">
            <div class="controls-row">
                <span>Ghost Racer: </span>
                <button id="toggle-ghost" onclick="toggleGhost()">ON</button>
            </div>
            <div class="controls-row">
                <span>Upload Body Skin: </span>
                <input type="file" id="skin-upload" accept="image/*">
                <button onclick="resetSkin()">Default</button>
            </div>
        </div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 50px; color: #cc2222; margin: 0; text-shadow: 2px 2px 0px #fff;">CRASHED!</h1>
        <p style="font-size: 20px;">Press ENTER to Restart</p>
    </div>

    <script>
        // --- 1. GAME SETUP ---
        let score = 0, coinCount = 0, gameSpeed = 0.4, gameOver = false;
        let ghostEnabled = true;
        
        // Load High Score from local storage
        let highScore = localStorage.getItem('pagodaHighScore') || 0;
        document.getElementById('score').innerText = `Score: 0 | Coins: 0 | Best: ${highScore}`;

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0xffeebb, 20, 100); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 1, -8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffeebb); 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfffaee, 0.8); 
        dirLight.position.set(20, 30, 10);
        scene.add(dirLight);

        // --- 2. CHARACTER BUILDER ---
        function createCharacter(shirtColor) {
            const charGroup = new THREE.Group(); 
            let skinMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 }); 
            let shirtMat = new THREE.MeshLambertMaterial({ color: shirtColor }); 
            let pantsMat = new THREE.MeshLambertMaterial({ color: 0x222222 }); 

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMat);
            head.position.y = 2.4; charGroup.add(head);

            const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.5), shirtMat);
            body.position.y = 1.4; charGroup.add(body);
            charGroup.bodyMesh = body; 

            const legLGroup = new THREE.Group();
            legLGroup.position.set(-0.25, 0.8, 0); 
            const legLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), pantsMat);
            legLMesh.position.y = -0.4; legLGroup.add(legLMesh);
            charGroup.add(legLGroup); charGroup.legL = legLGroup;

            const legRGroup = new THREE.Group();
            legRGroup.position.set(0.25, 0.8, 0); 
            const legRMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), pantsMat);
            legRMesh.position.y = -0.4; legRGroup.add(legRMesh);
            charGroup.add(legRGroup); charGroup.legR = legRGroup;

            return charGroup;
        }

        // PLAYER
        const player = createCharacter(0x2288cc);
        const jetpackMat = new THREE.MeshLambertMaterial({ color: 0xddaa00 });
        const pack = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), jetpackMat);
        pack.position.set(0, 1.4, 0.4); player.add(pack);
        
        const boardMat = new THREE.MeshLambertMaterial({ color: 0x00ffcc });
        const skateboard = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.15, 1.8), boardMat);
        skateboard.position.y = -0.05;
        skateboard.visible = false;
        player.add(skateboard);
        
        scene.add(player);

        // RIVAL AI
        const rival = createCharacter(0x3333ff); 
        rival.position.set(3, 0, -5); 
        scene.add(rival);
        let rivalLane = 2;
        let rivalMoveTimer = 0;

        // --- UI ACTIONS ---
        let playerShirtMat = new THREE.MeshLambertMaterial({ color: 0x2288cc });
        document.getElementById('skin-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    player.bodyMesh.material = new THREE.MeshLambertMaterial({ map: texture }); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
        window.resetSkin = () => player.bodyMesh.material = playerShirtMat;

        window.toggleGhost = () => {
            ghostEnabled = !ghostEnabled;
            const btn = document.getElementById('toggle-ghost');
            btn.innerText = ghostEnabled ? "ON" : "OFF";
            btn.style.background = ghostEnabled ? "#228b22" : "#888888";
            rival.visible = ghostEnabled;
        };

        // --- 3. THE ENVIRONMENT & DECORATIONS ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 300), 
            new THREE.MeshLambertMaterial({ color: 0xd2b48c }) 
        );
        ground.rotation.x = -Math.PI / 2; ground.position.z = -50; scene.add(ground);

        const laneMat = new THREE.MeshBasicMaterial({ color: 0x8b4513 }); 
        const lineLeft = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 300), laneMat);
        lineLeft.rotation.x = -Math.PI / 2; lineLeft.position.set(-1.5, 0.01, -50); scene.add(lineLeft);
        const lineRight = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 300), laneMat);
        lineRight.rotation.x = -Math.PI / 2; lineRight.position.set(1.5, 0.01, -50); scene.add(lineRight);

        let decorations = [];
        const matRed = new THREE.MeshLambertMaterial({ color: 0xcc2222 }); 
        const matRoof = new THREE.MeshLambertMaterial({ color: 0x228b22 }); 
        const matWood = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
        const matBamboo = new THREE.MeshLambertMaterial({ color: 0x3cb371 });

        const pagodaBaseGeo = new THREE.BoxGeometry(2.5, 3, 2.5);
        const pagodaRoofGeo = new THREE.ConeGeometry(3, 1.5, 4); 
        pagodaRoofGeo.rotateY(Math.PI / 4); 
        
        const archPillarGeo = new THREE.BoxGeometry(0.6, 6, 0.6);
        const archTopGeo = new THREE.BoxGeometry(10, 0.8, 0.8);
        const bambooGeo = new THREE.CylinderGeometry(0.2, 0.2, 8, 8);

        function spawnDecoration(zPos) {
            const decorGroup = new THREE.Group();
            
            let rand = Math.random();
            if (rand < 0.4) {
                let tiers = 2 + Math.floor(Math.random() * 3); 
                let currentY = 0;
                for(let i=0; i<tiers; i++) {
                    let base = new THREE.Mesh(pagodaBaseGeo, matRed); base.position.y = currentY + 1.5; decorGroup.add(base);
                    let roof = new THREE.Mesh(pagodaRoofGeo, matRoof); roof.position.y = currentY + 3 + 0.75; decorGroup.add(roof);
                    currentY += 3;
                }
                let side = Math.random() > 0.5 ? 1 : -1;
                decorGroup.position.set((7 + Math.random() * 4) * side, 0, 0);
            } else if (rand < 0.7) {
                let pillarL = new THREE.Mesh(archPillarGeo, matRed); pillarL.position.set(-5, 3, 0); decorGroup.add(pillarL);
                let pillarR = new THREE.Mesh(archPillarGeo, matRed); pillarR.position.set(5, 3, 0); decorGroup.add(pillarR);
                let topBeam = new THREE.Mesh(archTopGeo, matWood); topBeam.position.set(0, 6.2, 0); decorGroup.add(topBeam);
            } else {
                let side = Math.random() > 0.5 ? 1 : -1;
                for(let i=0; i<5; i++) {
                    let bamboo = new THREE.Mesh(bambooGeo, matBamboo);
                    bamboo.position.set((6 + Math.random() * 5) * side, 4, -2 + Math.random() * 4);
                    decorGroup.add(bamboo);
                }
            }

            decorGroup.position.z = zPos;
            scene.add(decorGroup);
            decorations.push(decorGroup);
        }
        for(let i=0; i<20; i++) spawnDecoration(-i * 15);

        // --- 4. GAME MECHANICS ---
        const laneXPositions = [-3, 0, 3]; 
        let currentLane = 1;
        
        let isJumping = false, isSliding = false;
        let jetpackActive = false, jetpackFuel = 100, jetpackCooldown = 0;
        let hasBoard = false, iFrames = 0;
        let slideTimer;
        let verticalVelocity = 0;
        const gravity = -0.035; 

        let obstacles = [];
        let coins = [];
        let framesSinceLastSpawn = 0;

        const roadblockGeo = new THREE.BoxGeometry(1.4, 0.8, 0.5); 
        const hurdleGeo = new THREE.BoxGeometry(1.4, 0.2, 0.5);    
        const trainGeo = new THREE.BoxGeometry(1.4, 2.5, 8.0);     
        
        const matJump = new THREE.MeshLambertMaterial({ color: 0xffaa00 }); 
        const matSlide = new THREE.MeshLambertMaterial({ color: 0xcc2222 }); 
        const matTrain = new THREE.MeshLambertMaterial({ color: 0xffffff }); 
        const coinMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });

        function updateUI() {
            // Save high score if beaten
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('pagodaHighScore', highScore);
            }

            document.getElementById('score').innerText = `Score: ${score} | Coins: ${coinCount} | Best: ${highScore}`;
            
            let jetStatus = jetpackCooldown > 0 ? "RECHARGING" : "READY";
            let boardStatus = hasBoard ? "EQUIPPED" : (coinCount >= 20 ? "PRESS 'B' TO BUY" : "NEED 20 COINS");
            
            document.getElementById('powerup-meter').innerText = `Jetpack: ${jetStatus} (SHIFT) | Board: ${boardStatus}`;
            document.getElementById('powerup-meter').style.color = jetpackCooldown > 0 ? "#cc2222" : "#228b22";
        }

        function spawnWorldObjects() {
            framesSinceLastSpawn++;
            let spawnCooldown = Math.max(25, 60 - (score * 0.1)); 
            
            if (framesSinceLastSpawn > spawnCooldown && Math.random() > 0.3) { 
                let typeRand = Math.random();
                let obsLane = Math.floor(Math.random() * 3);
                let obs;

                if (typeRand < 0.2) {
                    obs = new THREE.Mesh(trainGeo, matTrain);
                    obs.position.set(laneXPositions[obsLane], 1.25, -90); obs.isTrain = true;
                } else if (typeRand < 0.5) {
                    obs = new THREE.Mesh(hurdleGeo, matSlide);
                    obs.position.set(laneXPositions[obsLane], 1.6, -80); obs.isHigh = true;
                } else {
                    obs = new THREE.Mesh(roadblockGeo, matJump);
                    obs.position.set(laneXPositions[obsLane], 0.4, -80); obs.isHigh = false;
                }
                
                scene.add(obs); obstacles.push(obs);

                let coinLane = (obsLane + 1 + Math.floor(Math.random() * 2)) % 3;
                const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16), coinMat);
                coin.rotation.x = Math.PI / 2;
                coin.position.set(laneXPositions[coinLane], typeRand < 0.5 ? 0.5 : 1.2, -80);
                scene.add(coin); coins.push(coin);

                framesSinceLastSpawn = 0;
            }
        }

        // --- CONTROLS ---
        document.addEventListener('keydown', (e) => {
            if (gameOver && e.key === 'Enter') return resetGame();
            if (gameOver) return;

            const key = e.key.toLowerCase(); 

            if ((key === 'arrowleft' || key === 'a') && currentLane > 0) currentLane--;
            if ((key === 'arrowright' || key === 'd') && currentLane < 2) currentLane++;
            
            if ((key === 'arrowup' || key === 'w' || key === ' ') && !isJumping && !isSliding && !jetpackActive) {
                isJumping = true; verticalVelocity = 0.55; 
            }

            if ((key === 'arrowdown' || key === 's') && !isJumping && !isSliding && !jetpackActive) {
                isSliding = true; player.scale.y = 0.5; player.position.y = -0.4; 
                clearTimeout(slideTimer);
                slideTimer = setTimeout(() => { player.scale.y = 1; player.position.y = 0; isSliding = false; }, 700); 
            }

            if (key === 'shift' && jetpackCooldown <= 0 && !jetpackActive) {
                jetpackActive = true; jetpackFuel = 150; isJumping = false; isSliding = false; player.scale.y = 1; 
                document.getElementById('powerup-meter').innerText = "Jetpack: ACTIVE!";
            }

            if (key === 'b' && coinCount >= 20 && !hasBoard) {
                coinCount -= 20; hasBoard = true; skateboard.visible = true; player.position.y = 0.2; updateUI();
            }
        });

        function resetGame() {
            gameOver = false; score = 0; coinCount = 0; gameSpeed = 0.4; currentLane = 1;
            jetpackActive = false; jetpackCooldown = 0; hasBoard = false; iFrames = 0;
            skateboard.visible = false;
            
            clearTimeout(slideTimer);
            player.position.set(laneXPositions[currentLane], 0, 0);
            player.scale.y = 1; isSliding = false; isJumping = false;
            player.visible = true;
            
            rival.position.set(laneXPositions[2], 0, -5); rivalLane = 2;

            document.getElementById('game-over').style.display = 'none';
            updateUI();
            framesSinceLastSpawn = 0;
            
            obstacles.forEach(obs => scene.remove(obs)); obstacles = [];
            coins.forEach(c => scene.remove(c)); coins = [];
            animate();
        }

        // --- 5. ANIMATION LOOP ---
        function animate() {
            if (gameOver) return;
            requestAnimationFrame(animate);

            player.position.x += (laneXPositions[currentLane] - player.position.x) * 0.2; 
            
            if (iFrames > 0) {
                iFrames--;
                player.visible = (iFrames % 10 < 5); 
            } else {
                player.visible = true;
            }

            if (ghostEnabled) {
                rival.position.x += (laneXPositions[rivalLane] - rival.position.x) * 0.1;
                rival.position.y = Math.abs(Math.sin(Date.now() * 0.01)) * 0.2;
                rival.legL.rotation.x = Math.sin(Date.now() * 0.015) * 0.6;
                rival.legR.rotation.x = Math.sin(Date.now() * 0.015 + Math.PI) * 0.6;
                
                rivalMoveTimer--;
                if (rivalMoveTimer <= 0) {
                    let dir = Math.random() > 0.5 ? 1 : -1;
                    if (rivalLane + dir >= 0 && rivalLane + dir <= 2) rivalLane += dir;
                    rivalMoveTimer = 50 + Math.random() * 100; 
                }
            }

            if (jetpackActive) {
                player.position.y += (5.0 - player.position.y) * 0.1;
                jetpackFuel--;
                player.legL.rotation.x = -0.5; player.legR.rotation.x = -0.5; 
                if (jetpackFuel <= 0) {
                    jetpackActive = false; isJumping = true; verticalVelocity = 0; jetpackCooldown = 500; updateUI();
                }
            } else {
                if (jetpackCooldown > 0) {
                    jetpackCooldown--;
                    if(jetpackCooldown === 0) updateUI();
                }

                if (!isJumping && !isSliding) {
                    const time = Date.now() * 0.015; 
                    player.legL.rotation.x = Math.sin(time) * 0.6; player.legR.rotation.x = Math.sin(time + Math.PI) * 0.6; 
                } else if (isSliding) {
                    player.legL.rotation.x = 0.5; player.legR.rotation.x = 0.5;
                }

                if (isJumping) {
                    player.position.y += verticalVelocity; verticalVelocity += gravity;
                    let groundLevel = hasBoard ? 0.2 : 0;
                    if (player.position.y <= groundLevel) {
                        player.position.y = groundLevel; isJumping = false; verticalVelocity = 0;
                        player.legL.rotation.x = 0; player.legR.rotation.x = 0;
                    }
                }
            }

            decorations.forEach((d, index) => {
                d.position.z += gameSpeed;
                if(d.position.z > 20) {
                    scene.remove(d); decorations.splice(index, 1); spawnDecoration(-180); 
                }
            });

            spawnWorldObjects();

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.position.z += obs.isTrain ? gameSpeed * 1.6 : gameSpeed;

                if (obs.position.z > -0.8 && obs.position.z < 0.8 && player.position.y < 3.0 && iFrames === 0) { 
                    if (Math.abs(player.position.x - obs.position.x) < 0.8) { 
                        let hit = false;
                        if (obs.isTrain) hit = true; 
                        else if (obs.isHigh && !isSliding) hit = true; 
                        else if (!obs.isHigh && player.position.y < 0.8) hit = true; 
                        
                        if (hit) {
                            if (hasBoard) {
                                hasBoard = false; skateboard.visible = false; iFrames = 60; player.position.y = 0; updateUI();
                                scene.remove(obs); obstacles.splice(i, 1); i--; continue; 
                            } else {
                                gameOver = true; document.getElementById('game-over').style.display = 'block';
                            }
                        }
                    }
                }

                if (obs.position.z > 10) {
                    scene.remove(obs); obstacles.splice(i, 1); i--;
                    score += 10; updateUI(); gameSpeed += 0.0005; 
                }
            }

            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                coin.position.z += gameSpeed; coin.rotation.y += 0.05; 

                if (coin.position.z > -0.5 && coin.position.z < 0.5) {
                    if (Math.abs(player.position.x - coin.position.x) < 1.0 && Math.abs(player.position.y - coin.position.y) < 1.5) {
                        scene.remove(coin); coins.splice(i, 1); i--;
                        coinCount++; score += 5; updateUI(); continue;
                    }
                }
                if (coin.position.z > 10) { scene.remove(coin); coins.splice(i, 1); i--; }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
