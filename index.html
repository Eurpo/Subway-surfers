<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Subway Surfers Demake</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b1d3a; font-family: sans-serif; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px; width: 100%; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; color: #00ffcc; }
        #score { font-size: 24px; font-weight: bold; color: gold; margin-bottom: 5px; }
        #jetpack-meter { font-size: 18px; color: #ff3366; font-weight: bold; margin-bottom: 10px; }
        .instructions { font-size: 14px; margin-bottom: 10px; color: #ddd; font-weight: bold; }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; text-shadow: 2px 2px 4px #000; z-index: 20;
        }
        .skin-controls { pointer-events: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; display: inline-block;}
        button, input[type="file"] {
            padding: 8px 12px; margin-right: 5px; cursor: pointer;
            background: #ff5e00; color: white; border: none; border-radius: 4px; font-weight: bold;
        }
        button:hover { background: #e04d00; }
        input[type="file"] { background: #333; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>Night City Runner</h1>
        <div id="score">Score: 0 | Coins: 0</div>
        <div id="jetpack-meter">Jetpack: READY (Press SPACE)</div>
        <div class="instructions">⬆️ Jump | ⬇️ Slide | ⬅️➡️ Move | SPACE to Fly</div>
        <div class="skin-controls">
            <span>Upload Body Skin: </span>
            <input type="file" id="skin-upload" accept="image/*">
            <button onclick="resetSkin()">Default</button>
        </div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 50px; color: #ff3333; margin: 0;">CRASHED!</h1>
        <p style="font-size: 20px;">Press ENTER to Restart</p>
    </div>

    <script>
        // --- 1. GAME SETUP ---
        let score = 0, coinCount = 0, gameSpeed = 0.4, gameOver = false;
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0b1d3a, 20, 90); // Darker night fog

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 1, -8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0b1d3a); // Night sky
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffaaaa, 0.8); // Slightly orange street light feel
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 2. THE PLAYER ---
        const player = new THREE.Group(); 
        
        let skinMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 }); 
        let shirtMat = new THREE.MeshLambertMaterial({ color: 0x00ffcc }); // Neon shirt
        let pantsMat = new THREE.MeshLambertMaterial({ color: 0x222222 }); 
        let jetpackMat = new THREE.MeshLambertMaterial({ color: 0x666666 });

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMat);
        head.position.y = 2.4; 
        player.add(head);

        const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.5), shirtMat);
        body.position.y = 1.4; 
        player.add(body);

        // Jetpack Backpack
        const pack = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), jetpackMat);
        pack.position.set(0, 1.4, 0.4);
        player.add(pack);

        // Legs
        const legLGroup = new THREE.Group();
        legLGroup.position.set(-0.25, 0.8, 0); 
        const legLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), pantsMat);
        legLMesh.position.y = -0.4; 
        legLGroup.add(legLMesh);
        player.add(legLGroup);

        const legRGroup = new THREE.Group();
        legRGroup.position.set(0.25, 0.8, 0); 
        const legRMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), pantsMat);
        legRMesh.position.y = -0.4;
        legRGroup.add(legRMesh);
        player.add(legRGroup);

        player.position.y = 0; 
        scene.add(player);

        // Skin Logic
        document.getElementById('skin-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    body.material = new THREE.MeshLambertMaterial({ map: texture }); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
        window.resetSkin = () => body.material = shirtMat;

        // --- 3. THE ENVIRONMENT & CITYSCAPE ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 300), 
            new THREE.MeshLambertMaterial({ color: 0x111111 })
        );
        ground.rotation.x = -Math.PI / 2; 
        ground.position.z = -50;
        scene.add(ground);

        // Lane Lines
        const laneMat = new THREE.MeshBasicMaterial({ color: 0x555555 });
        const lineLeft = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 300), laneMat);
        lineLeft.rotation.x = -Math.PI / 2; lineLeft.position.set(-1.5, 0.01, -50); scene.add(lineLeft);
        const lineRight = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 300), laneMat);
        lineRight.rotation.x = -Math.PI / 2; lineRight.position.set(1.5, 0.01, -50); scene.add(lineRight);

        // City Buildings Array
        let buildings = [];
        const bldgGeo = new THREE.BoxGeometry(3, 1, 3);
        const bldgMat1 = new THREE.MeshLambertMaterial({ color: 0x223344 });
        const bldgMat2 = new THREE.MeshLambertMaterial({ color: 0x112233 });

        function spawnBuilding(zPos) {
            let height = 5 + Math.random() * 15;
            let mesh = new THREE.Mesh(bldgGeo, Math.random() > 0.5 ? bldgMat1 : bldgMat2);
            mesh.scale.y = height;
            // Spawn left or right side
            let side = Math.random() > 0.5 ? 1 : -1;
            mesh.position.set((8 + Math.random() * 5) * side, height/2, zPos);
            scene.add(mesh);
            buildings.push(mesh);
        }
        // Pre-fill city
        for(let i=0; i<20; i++) spawnBuilding(-i * 10);

        // --- 4. GAME MECHANICS ---
        const laneXPositions = [-3, 0, 3]; 
        let currentLane = 1;
        
        let isJumping = false, isSliding = false;
        let jetpackActive = false, jetpackFuel = 100, jetpackCooldown = 0;
        let slideTimer;
        let verticalVelocity = 0;
        const gravity = -0.035; 

        let obstacles = [];
        let coins = [];
        let framesSinceLastSpawn = 0;

        // Better Obstacle Geometries
        const roadblockGeo = new THREE.BoxGeometry(1.4, 0.8, 0.5); // Jump over
        const hurdleGeo = new THREE.BoxGeometry(1.4, 0.2, 0.5);    // Slide under (floats)
        const trainGeo = new THREE.BoxGeometry(1.4, 2.5, 8.0);     // Moving train
        
        const matJump = new THREE.MeshLambertMaterial({ color: 0xffaa00 }); 
        const matSlide = new THREE.MeshLambertMaterial({ color: 0xff0044 }); 
        const matTrain = new THREE.MeshLambertMaterial({ color: 0x0088ff }); 
        const coinMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });

        function spawnWorldObjects() {
            framesSinceLastSpawn++;
            let spawnCooldown = Math.max(25, 60 - (score * 0.1)); 
            
            if (framesSinceLastSpawn > spawnCooldown && Math.random() > 0.3) { 
                let typeRand = Math.random();
                let obsLane = Math.floor(Math.random() * 3);
                let obs;

                if (typeRand < 0.2) {
                    // TRAIN (20% chance)
                    obs = new THREE.Mesh(trainGeo, matTrain);
                    obs.position.set(laneXPositions[obsLane], 1.25, -90); // Spawn further back
                    obs.isTrain = true;
                } else if (typeRand < 0.5) {
                    // HURDLE - Slide under (30% chance)
                    obs = new THREE.Mesh(hurdleGeo, matSlide);
                    obs.position.set(laneXPositions[obsLane], 1.6, -80); // Floating up high
                    obs.isHigh = true;
                } else {
                    // ROADBLOCK - Jump over (50% chance)
                    obs = new THREE.Mesh(roadblockGeo, matJump);
                    obs.position.set(laneXPositions[obsLane], 0.4, -80); 
                    obs.isHigh = false;
                }
                
                scene.add(obs);
                obstacles.push(obs);

                // Spawn Coin
                let coinLane = (obsLane + 1 + Math.floor(Math.random() * 2)) % 3;
                const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16), coinMat);
                coin.rotation.x = Math.PI / 2;
                // If hurdle, put coin under it sometimes, else normal height
                coin.position.set(laneXPositions[coinLane], typeRand < 0.5 ? 0.5 : 1.2, -80);
                scene.add(coin);
                coins.push(coin);

                framesSinceLastSpawn = 0;
            }
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (gameOver && e.key === 'Enter') return resetGame();
            if (gameOver) return;

            if (e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
            if (e.key === 'ArrowRight' && currentLane < 2) currentLane++;
            
            if (e.key === 'ArrowUp' && !isJumping && !isSliding && !jetpackActive) {
                isJumping = true;
                verticalVelocity = 0.55; 
            }

            if (e.key === 'ArrowDown' && !isJumping && !isSliding && !jetpackActive) {
                isSliding = true;
                player.scale.y = 0.5; 
                player.position.y = -0.4; 
                clearTimeout(slideTimer);
                slideTimer = setTimeout(() => {
                    player.scale.y = 1; player.position.y = 0; isSliding = false;
                }, 700); 
            }

            // JETPACK ACTIVATION
            if (e.code === 'Space' && jetpackCooldown <= 0 && !jetpackActive) {
                jetpackActive = true;
                jetpackFuel = 150; // How long it lasts
                isJumping = false; isSliding = false; // Override other moves
                player.scale.y = 1; 
                document.getElementById('jetpack-meter').innerText = "Jetpack: ACTIVE!";
                document.getElementById('jetpack-meter').style.color = "#00ffcc";
            }
        });

        function resetGame() {
            gameOver = false;
            score = 0; coinCount = 0; gameSpeed = 0.4; currentLane = 1;
            jetpackActive = false; jetpackCooldown = 0;
            
            clearTimeout(slideTimer);
            player.position.set(laneXPositions[currentLane], 0, 0);
            player.scale.y = 1; isSliding = false; isJumping = false;
            
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('score').innerText = `Score: 0 | Coins: 0`;
            document.getElementById('jetpack-meter').innerText = "Jetpack: READY (Press SPACE)";
            framesSinceLastSpawn = 0;
            
            obstacles.forEach(obs => scene.remove(obs)); obstacles = [];
            coins.forEach(c => scene.remove(c)); coins = [];
            animate();
        }

        // --- 5. ANIMATION LOOP ---
        function animate() {
            if (gameOver) return;
            requestAnimationFrame(animate);

            // Move player left/right smoothly
            player.position.x += (laneXPositions[currentLane] - player.position.x) * 0.2; 

            // Jetpack Logic
            if (jetpackActive) {
                // Fly up to Y=5
                player.position.y += (5.0 - player.position.y) * 0.1;
                jetpackFuel--;
                legLGroup.rotation.x = -0.5; legRGroup.rotation.x = -0.5; // Legs hang down
                
                if (jetpackFuel <= 0) {
                    jetpackActive = false;
                    isJumping = true; // Use jumping logic to fall back down safely
                    verticalVelocity = 0;
                    jetpackCooldown = 500; // Cooldown before next use
                }
            } else {
                // Cooldown logic
                if (jetpackCooldown > 0) {
                    jetpackCooldown--;
                    document.getElementById('jetpack-meter').innerText = `Jetpack: RECHARGING...`;
                    document.getElementById('jetpack-meter').style.color = "#ff3366";
                    if(jetpackCooldown === 0) {
                        document.getElementById('jetpack-meter').innerText = "Jetpack: READY (Press SPACE)";
                        document.getElementById('jetpack-meter').style.color = "#00ffcc";
                    }
                }

                // Normal Running/Jumping Animations
                if (!isJumping && !isSliding) {
                    const time = Date.now() * 0.015; 
                    legLGroup.rotation.x = Math.sin(time) * 0.6;
                    legRGroup.rotation.x = Math.sin(time + Math.PI) * 0.6; 
                } else if (isSliding) {
                    legLGroup.rotation.x = 0.5; legRGroup.rotation.x = 0.5;
                }

                if (isJumping) {
                    player.position.y += verticalVelocity;
                    verticalVelocity += gravity;
                    if (player.position.y <= 0) {
                        player.position.y = 0;
                        isJumping = false;
                        verticalVelocity = 0;
                        legLGroup.rotation.x = 0; legRGroup.rotation.x = 0;
                    }
                }
            }

            // Move City Background
            buildings.forEach((b, index) => {
                b.position.z += gameSpeed;
                if(b.position.z > 20) {
                    scene.remove(b);
                    buildings.splice(index, 1);
                    spawnBuilding(-150); // Spawn new building far away
                }
            });

            spawnWorldObjects();

            // Obstacles Logic
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                
                // Trains move faster!
                obs.position.z += obs.isTrain ? gameSpeed * 1.6 : gameSpeed;

                // Collision Detection (Only if not flying high above)
                if (obs.position.z > -0.8 && obs.position.z < 0.8 && player.position.y < 3.0) { 
                    if (Math.abs(player.position.x - obs.position.x) < 0.8) { 
                        if (obs.isTrain) {
                            gameOver = true; // Train always kills if you are in the lane and not flying
                        } else if (obs.isHigh && !isSliding) {
                            gameOver = true; // Hit top bar
                        } else if (!obs.isHigh && player.position.y < 0.8) {
                            gameOver = true; // Tripped on roadblock
                        }
                        
                        if (gameOver) document.getElementById('game-over').style.display = 'block';
                    }
                }

                if (obs.position.z > 10) {
                    scene.remove(obs); obstacles.splice(i, 1); i--;
                    score += 10;
                    document.getElementById('score').innerText = `Score: ${score} | Coins: ${coinCount}`;
                    gameSpeed += 0.0005; 
                }
            }

            // Coins Logic
            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                coin.position.z += gameSpeed;
                coin.rotation.y += 0.05; 

                if (coin.position.z > -0.5 && coin.position.z < 0.5) {
                    // Jetpack magnetizes coins slightly, or normal collection
                    if (Math.abs(player.position.x - coin.position.x) < 1.0 && Math.abs(player.position.y - coin.position.y) < 1.5) {
                        scene.remove(coin); coins.splice(i, 1); i--;
                        coinCount++; score += 5;
                        document.getElementById('score').innerText = `Score: ${score} | Coins: ${coinCount}`;
                        continue;
                    }
                }

                if (coin.position.z > 10) {
                    scene.remove(coin); coins.splice(i, 1); i--;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
