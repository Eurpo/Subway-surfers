<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Subway Surfers Demake</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px; width: 100%; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; }
        #score { font-size: 20px; font-weight: bold; color: gold; }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; text-shadow: 2px 2px 4px #000;
        }
        .skin-controls { margin-top: 10px; pointer-events: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; display: inline-block;}
        button, input[type="file"] {
            padding: 8px 12px; margin-right: 5px; cursor: pointer;
            background: #ff5e00; color: white; border: none; border-radius: 4px; font-weight: bold;
        }
        button:hover { background: #e04d00; }
        input[type="file"] { background: #333; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>3D Runner</h1>
        <div id="score">Score: 0</div>
        <div class="skin-controls">
            <span>Upload Skin for Body: </span>
            <input type="file" id="skin-upload" accept="image/*">
            <button onclick="resetSkin()">Default Red</button>
        </div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 40px; color: red;">CRASHED!</h1>
        <p>Press ENTER to Restart</p>
    </div>

    <script>
        // --- 1. GAME SETUP ---
        let score = 0;
        let gameSpeed = 0.4; 
        let gameOver = false;
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 1, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB); 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 2. THE PLAYER (Block Person) ---
        const player = new THREE.Group(); 
        
        let skinMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 }); 
        let shirtMat = new THREE.MeshLambertMaterial({ color: 0xff3333 }); 
        let pantsMat = new THREE.MeshLambertMaterial({ color: 0x2222ff }); 

        // Head
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMat);
        head.position.y = 2.0;
        player.add(head);

        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.5), shirtMat);
        body.position.y = 1.0;
        player.add(body);

        // Legs (Adjusted pivot points for swinging)
        const legGeo = new THREE.BoxGeometry(0.4, 0.8, 0.4);
        legGeo.translate(0, -0.4, 0); // Move the pivot point to the top of the leg

        const legL = new THREE.Mesh(legGeo, pantsMat);
        legL.position.set(-0.25, 0.8, 0); // Position at the hip
        player.add(legL);

        const legR = new THREE.Mesh(legGeo, pantsMat);
        legR.position.set(0.25, 0.8, 0); // Position at the hip
        player.add(legR);

        player.position.y = 0; 
        scene.add(player);

        // --- Skin Upload Logic ---
        document.getElementById('skin-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    body.material = new THREE.MeshLambertMaterial({ map: texture }); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        window.resetSkin = function() {
            body.material = shirtMat;
            document.getElementById('skin-upload').value = ""; 
        };

        const groundGeo = new THREE.PlaneGeometry(
